services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: transcendence_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      - transcendence_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # HashiCorp Vault for secrets management
  vault:
    image: hashicorp/vault:1.16
    container_name: transcendence_vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-transcendence}
      GITHUB_ID_CLIENT: ${GITHUB_ID_CLIENT:-}
    volumes:
      - vault_data:/vault/data
      - ./secrets/vault_backend_token:/vault/data/vault_backend_token
      - ./vault/config:/vault/config
      - ./vault/policies:/vault/policies
      - ./vault/init-vault.sh:/vault/init-vault.sh
      - ./vault/entrypoint.sh:/usr/local/bin/vault-entrypoint.sh
    networks:
      - transcendence_network
    secrets:
      - vault_root_token
      - vault_backend_token
      - postgres_password
      - github_client_secret
    entrypoint: ["/bin/sh", "/usr/local/bin/vault-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "vault status && test -f /tmp/vault-init-done"]
      interval: 5s
      timeout: 5s
      retries: 12

  #Backend Node.js
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: transcendence_backend
    working_dir: /app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-https://localhost}
      BASE_URL: ${CLIENT_URL:-https://localhost}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /run/secrets/vault_backend_token
      GITHUB_ID_CLIENT: ${GITHUB_ID_CLIENT:-}
      GITHUB_CLIENT_SECRET_FILE: /run/secrets/github_client_secret
      GIT_BRANCH: "prod"
      PGPASSWORD: /run/secrets/postgres_password
      PGUSER: ${POSTGRES_USER:-postgres}
      PGDATABASE: ${POSTGRES_DB:-transcendence}
      PGHOST: postgres

    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - transcendence_network
    secrets:
      - vault_backend_token
      - github_client_secret
      - postgres_password
    volumes:
      - prisma_migrations:/app/prisma/migrations
      - ./server/prisma/migrations:/migrations
      - ./server/src:/app/src
      - ./server/uploads:/app/uploads
    #   - ./server:/app
    #   - /app/node_modules
    restart: unless-stopped

  # Frontend React/Vite
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
      args:
        - VITE_API_URL=/api/v1
    working_dir: /app
    user: "0:0"
    container_name: transcendence_frontend
    environment:
      VITE_API_URL: /api/v1
    command: ["npx", "vite", "build", "--watch"]
    networks:
      - transcendence_network
    volumes:
      - frontend_data:/app/dist
      - ./client/src:/app/src
      - ./client/public:/app/public
    restart: unless-stopped

  # Nginx with ModSecurity v3 and WAF
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: transcendence_nginx
    ports:
      - "${NGINX_PORT_HTTP:-80}:80"
      - "${NGINX_PORT_HTTPS:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/modsecurity:/etc/nginx/modsecurity:ro
      # CRS is built into the image (Dockerfile); do not mount host crs/ or it overrides and breaks
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - frontend_data:/var/www/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - transcendence_network
    restart: unless-stopped

networks:
  transcendence_network:
    driver: bridge

volumes:
  postgres_data:
  vault_data:
  frontend_data:
  prisma_migrations:

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  vault_root_token:
    file: ./secrets/vault_root_token
  vault_backend_token:
    file: ./secrets/vault_backend_token
  github_client_secret:
    file: ./secrets/github_client_secret
